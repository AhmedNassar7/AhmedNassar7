name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 04:00 AM Egypt time
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}

    steps:
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmedNassar7
          template: classic
          base: header, activity, community, repositories, metadata
          filename: assets/metrics.plugin.overview.svg

      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmedNassar7
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: assets/metrics.plugin.isocalendar.fullyear.svg

      - name: Introduction
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmedNassar7
          base: ""
          plugin_introduction: yes
          plugin_introduction_title: yes
          filename: assets/metrics.plugin.introduction.svg

      - name: Stargazers
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmedNassar7
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          filename: assets/metrics.plugin.stargazers.svg

      - name: WakaTime
        if: ${{ env.WAKATIME_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmedNassar7
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: >-
            time, projects, projects-graphs, languages, languages-graphs,
            editors, os
          plugin_wakatime_token: ${{ env.WAKATIME_TOKEN }}
          filename: assets/metrics.plugin.wakatime.svg